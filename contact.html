<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
  </head>
  <body>
    <ul class="nav nav-tabs">
      <li role="presentation"><a href="https://yosukeino.github.io/">Home</a></li>
      <li role="presentation"><a href="https://yosukeino.github.io/works">Works</a></li>
      <li role="presentation" class="active"><a href="https://yosukeino.github.io/contact">Contact</a></li>
    </ul>
    <h1>Contact Yosuke</h1>
    <form class="form-horizontal">
              <div class="form-group">
              <label for="inputName" class="col-md-2 control-label">Name</label>
              <div class="col-md-10">
                <input type="text" class="form-control" id="inputName" placeholder="ex)Yosuke Inomata">
              </div>
            </div>
            <div class="form-group">
              <label for="inputEmail" class="col-md-2 control-label">mail adress</label>
              <div class="col-md-10">
                <input type="email" class="form-control" id="inputEmail" placeholder="ex)yosuke0719@gmail.com">
              </div>
            </div>
            <div class="form-group">
              <label for="inputContent" class="col-md-2 control-label">comment</label>
              <div class="col-md-10">
                <textarea class="form-control" id="inputContent" rows="4" placeholder="...."></textarea>
              </div>
            </div>
            <div class="form-group">
              <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-default btn-success btn-block">SEND</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
